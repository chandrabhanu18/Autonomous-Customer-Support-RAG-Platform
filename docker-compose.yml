services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: intellisupport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d intellisupport"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/intellisupport
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: text-embedding-3-small
      GENERATION_MODEL: gpt-4o-mini
      CHUNK_SIZE: 512
      CHUNK_OVERLAP: 50
      HYBRID_ALPHA: 0.7
      TOP_K: 5
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
